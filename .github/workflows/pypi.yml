name: Publish Holster MCP to PyPI

on:
  push:
    tags: ["mcp-v*.*.*"]
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist
        working-directory: mcp
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: holster-mcp-sdist
          path: mcp/dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: Build wheel (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            cibw_archs: arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
            cibw_archs: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux wheel dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.23.3

      - name: Build platform wheel
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-win* pp* *-musllinux*"
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH"
          CIBW_BEFORE_ALL_LINUX: "curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal"
          CIBW_BEFORE_BUILD: "cargo build -p holster-doctor --release && python mcp/scripts/bundle_doctor.py"
          CIBW_TEST_COMMAND: "holster-mcp --help"
        run: python -m cibuildwheel mcp --output-dir wheelhouse

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: holster-mcp-wheel-${{ matrix.platform }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-22.04
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect distributions
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -lah dist

      - name: Publish to PyPI (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
