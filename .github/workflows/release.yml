name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-cli:
    name: Build holster-cli (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: holster-cli-macos-arm64
          # v0.7.0: added macOS Intel + Windows targets so the published
          # release covers Mac (arm64 + x86_64), Linux x86_64, and
          # Windows x86_64. Previous releases shipped macOS-arm64 + Linux only.
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: holster-cli-macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: holster-cli-linux-x86_64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: holster-cli-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-release-cargo-

      - name: Build CLI release
        run: cargo build -p holster-cli --release --target ${{ matrix.target }}

      - name: Strip binary (Linux only)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/holster-cli

      - name: Package (Unix — tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/holster-cli dist/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz holster-cli
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows — zip + .exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/holster-cli.exe" -Destination dist/
          Compress-Archive -Path dist/holster-cli.exe -DestinationPath "${{ matrix.artifact }}.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.artifact }}.zip").Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii "${{ matrix.artifact }}.zip.sha256"

      - name: Upload release artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          if-no-files-found: error

      - name: Upload release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: error

  # v0.7.0: Build the Tauri desktop app (with the new rotate-master UI) for
  # macOS + Linux + Windows. Each runner builds its native bundle:
  #   - macos-14 (arm64) -> .dmg (Apple Silicon)
  #   - macos-13 (x86_64) -> .dmg (Intel)
  #   - ubuntu-22.04 -> .AppImage + .deb
  #   - windows-2022 -> .msi installer + .exe NSIS installer
  # Unsigned for v0.7.0 — adding Apple Developer ID + Windows code signing
  # is a separate task (requires David's Apple Developer enrollment + cert
  # provisioning). Users will see a Gatekeeper warning on first launch;
  # they can clear with: xattr -d com.apple.quarantine /Applications/Holster.app
  build-desktop:
    name: Build Holster desktop (${{ matrix.platform.name }})
    # v0.7.0: desktop bundles paused per product decision — Dave is the only
    # current desktop user, the CLI is the customer-facing surface. Re-enable
    # by flipping this to `if: true` when desktop ships as a real product.
    if: false
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: "macos-arm64", os: "macos-14", target: "aarch64-apple-darwin" }
          - { name: "macos-x86_64", os: "macos-13", target: "x86_64-apple-darwin" }
          - { name: "linux-x86_64", os: "ubuntu-22.04", target: "x86_64-unknown-linux-gnu" }
          - { name: "windows-x86_64", os: "windows-2022", target: "x86_64-pc-windows-msvc" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux Tauri dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-desktop-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.target }}-desktop-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      # 3 previous attempts failed at "Build Tauri desktop bundle" with
      # "'tauri' is not recognized" — npm's @tauri-apps/cli bin shim
      # didn't resolve on Windows (and silently broke macOS/Linux too).
      # Switching to cargo-installed tauri-cli so the binary is in $PATH
      # via ~/.cargo/bin (which dtolnay/rust-toolchain adds). The
      # @tauri-apps/cli devDependency stays for local `npm run tauri`
      # convenience; CI uses the Rust binary.
      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri desktop bundle
        working-directory: apps/desktop
        run: cargo tauri build --target ${{ matrix.platform.target }}

      - name: Collect bundle artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          find target/${{ matrix.platform.target }}/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Collect bundle artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          find target/${{ matrix.platform.target }}/release/bundle -type f \
            \( -name "*.AppImage" -o -name "*.deb" \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Collect bundle artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Path "target/${{ matrix.platform.target }}/release/bundle" -Recurse -Include *.msi,*.exe |
            Where-Object { $_.Name -notmatch "holster-desktop\.exe$" } |
            Copy-Item -Destination dist
          Get-ChildItem dist

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holster-desktop-${{ matrix.platform.name }}
          path: dist/*
          if-no-files-found: warn

  release:
    name: Publish GitHub release
    needs:
      - build-cli
    # v0.7.0: desktop bundles paused — CLI-only release. The build-desktop
    # job still runs (so we know whether the Tauri pipeline is healthy)
    # but doesn't gate the release publish.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Inventory artifacts (debug)
        shell: bash
        run: find artifacts -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/holster-cli-macos-arm64/holster-cli-macos-arm64.tar.gz
            artifacts/holster-cli-macos-arm64/holster-cli-macos-arm64.tar.gz.sha256
            artifacts/holster-cli-macos-x86_64/holster-cli-macos-x86_64.tar.gz
            artifacts/holster-cli-macos-x86_64/holster-cli-macos-x86_64.tar.gz.sha256
            artifacts/holster-cli-linux-x86_64/holster-cli-linux-x86_64.tar.gz
            artifacts/holster-cli-linux-x86_64/holster-cli-linux-x86_64.tar.gz.sha256
            artifacts/holster-cli-windows-x86_64/holster-cli-windows-x86_64.zip
            artifacts/holster-cli-windows-x86_64/holster-cli-windows-x86_64.zip.sha256
          draft: false
          generate_release_notes: true
