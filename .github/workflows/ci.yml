name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    name: Rust workspace (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            rust: stable
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust: stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}

      - name: Install Linux workspace dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build Rust workspace
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Test Rust workspace
        run: cargo test --workspace --release --target ${{ matrix.target }}

      - name: Upload holster-doctor binary
        uses: actions/upload-artifact@v4
        with:
          name: holster-doctor-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/holster-doctor*
          if-no-files-found: error

  python-wheels:
    name: Python MCP wheel (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            cibw_archs: arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
            cibw_archs: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux wheel dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.23.3

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-win* pp* *-musllinux*"
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH"
          CIBW_BEFORE_ALL_LINUX: "curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal"
          CIBW_BEFORE_BUILD: "cargo build -p holster-doctor --release && python mcp/scripts/bundle_doctor.py"
          CIBW_TEST_COMMAND: "python -c \"from holster_mcp.free.rotation_playbook import rotation_playbook; assert rotation_playbook('github')['ok']\""
        run: python -m cibuildwheel mcp --output-dir wheelhouse

      - name: Upload holster-mcp wheels
        uses: actions/upload-artifact@v4
        with:
          name: holster-mcp-wheels-${{ matrix.platform }}
          path: wheelhouse/*.whl
          if-no-files-found: error
